<!DOCTYPE html>
<html lang="de">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Sentinel Cam Control</title>
        <style>
            :root {
                --bg: #151515;
                --bg-soft: #1d1d1d;
                --panel: #202020;
                --panel-soft: #272727;
                --line: rgba(255, 255, 255, 0.08);
                --text: #f3f3f3;
                --muted: #9b9b9b;
                --accent: #b8d799;
                --accent-strong: #d4efb5;
                --danger: #ff6d57;
                --shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
            }

            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                min-height: 100vh;
                font-family: "Segoe UI", "Helvetica Neue", sans-serif;
                color: var(--text);
                background:
                    radial-gradient(circle at top left, rgba(184, 215, 153, 0.08), transparent 20%),
                    linear-gradient(180deg, #1a1a1a 0%, #111111 100%);
            }

            .app {
                width: min(1320px, calc(100% - 24px));
                margin: 12px auto;
                padding: 14px;
                border: 1px solid var(--line);
                border-radius: 34px;
                background: rgba(25, 25, 25, 0.96);
                box-shadow: var(--shadow);
            }

            .layout {
                display: grid;
                grid-template-columns: 290px minmax(0, 1fr);
                gap: 14px;
                min-height: calc(100vh - 48px);
            }

            .sidebar,
            .main {
                border: 1px solid var(--line);
                border-radius: 28px;
                background: var(--panel);
            }

            .sidebar {
                padding: 18px;
                display: flex;
                flex-direction: column;
                gap: 18px;
            }

            .main {
                padding: 18px;
                display: flex;
                flex-direction: column;
                gap: 16px;
            }

            .brand {
                display: flex;
                align-items: center;
                gap: 12px;
            }

            .brand-mark {
                width: 44px;
                height: 44px;
                border-radius: 15px;
                display: grid;
                place-items: center;
                background: linear-gradient(135deg, var(--accent), var(--accent-strong));
                color: #223014;
                font-weight: 800;
            }

            h1,
            h2,
            h3,
            p {
                margin: 0;
            }

            .muted {
                color: var(--muted);
            }

            .nav-dots {
                display: grid;
                gap: 14px;
                justify-items: center;
                padding: 8px 0;
            }

            .nav-dots span {
                width: 6px;
                height: 6px;
                border-radius: 999px;
                background: rgba(255, 255, 255, 0.35);
            }

            .nav-dots span.active {
                height: 24px;
                background: var(--accent);
            }

            .camera-stack {
                display: grid;
                gap: 14px;
                align-content: start;
            }

            .camera-tile {
                padding: 12px;
                border-radius: 22px;
                background: var(--panel-soft);
                border: 1px solid rgba(255, 255, 255, 0.06);
                cursor: pointer;
                transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
            }

            .camera-tile:hover {
                transform: translateY(-1px);
                border-color: rgba(184, 215, 153, 0.35);
            }

            .camera-tile.active {
                background: #2b3224;
                border-color: rgba(184, 215, 153, 0.55);
                box-shadow: inset 0 0 0 1px rgba(184, 215, 153, 0.18);
            }

            .tile-head {
                display: flex;
                justify-content: space-between;
                gap: 12px;
                align-items: center;
                margin-bottom: 10px;
            }

            .state-pill,
            .info-pill {
                display: inline-flex;
                align-items: center;
                gap: 8px;
                padding: 8px 12px;
                border-radius: 999px;
                border: 1px solid rgba(255, 255, 255, 0.08);
                background: rgba(255, 255, 255, 0.04);
                font-size: 0.82rem;
            }

            .state-dot {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                background: var(--accent);
                box-shadow: 0 0 12px rgba(184, 215, 153, 0.7);
            }

            .tile-preview,
            .hero-feed {
                position: relative;
                overflow: hidden;
                background: #0f0f0f;
                border: 1px solid rgba(255, 255, 255, 0.06);
            }

            .tile-preview {
                border-radius: 18px;
                aspect-ratio: 1 / 1;
                margin-bottom: 10px;
            }

            .hero-feed {
                border-radius: 30px;
                aspect-ratio: 16 / 11;
                min-height: 520px;
            }

            .tile-preview img,
            .hero-feed img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                display: block;
            }

            .tile-overlay,
            .hero-overlay {
                position: absolute;
                inset: 0;
                display: flex;
                justify-content: space-between;
                align-items: flex-start;
                padding: 12px;
                background: linear-gradient(180deg, rgba(0, 0, 0, 0.38) 0%, rgba(0, 0, 0, 0.04) 46%, rgba(0, 0, 0, 0.58) 100%);
                pointer-events: none;
            }

            .chip {
                display: inline-flex;
                align-items: center;
                padding: 8px 11px;
                border-radius: 999px;
                background: rgba(12, 12, 12, 0.64);
                border: 1px solid rgba(255, 255, 255, 0.08);
                font-size: 0.8rem;
            }

            .chip.alert {
                color: #ffe1da;
                background: rgba(69, 26, 20, 0.8);
                border-color: rgba(255, 109, 87, 0.35);
            }

            .rename-box {
                display: flex;
                gap: 8px;
                margin-top: 10px;
            }

            input[type="text"] {
                width: 100%;
                min-width: 0;
                padding: 11px 12px;
                border-radius: 14px;
                border: 1px solid rgba(255, 255, 255, 0.08);
                background: #171717;
                color: var(--text);
                font-size: 0.92rem;
            }

            button {
                border: 0;
                border-radius: 14px;
                padding: 11px 14px;
                font-size: 0.92rem;
                font-weight: 700;
                cursor: pointer;
            }

            .accent-button {
                color: #233017;
                background: linear-gradient(135deg, var(--accent), var(--accent-strong));
            }

            .ghost-button {
                color: var(--text);
                background: rgba(255, 255, 255, 0.06);
                border: 1px solid rgba(255, 255, 255, 0.08);
            }

            .utility-button {
                width: 56px;
                height: 56px;
                border-radius: 18px;
                font-size: 1.3rem;
                align-self: center;
            }

            .main-head {
                display: flex;
                justify-content: space-between;
                gap: 16px;
                align-items: flex-start;
            }

            .main-toolbar {
                display: flex;
                flex-wrap: wrap;
                gap: 10px;
                align-items: center;
            }

            .switch {
                display: inline-flex;
                align-items: center;
                gap: 10px;
                padding: 10px 14px;
                border-radius: 999px;
                background: rgba(255, 255, 255, 0.05);
                border: 1px solid rgba(255, 255, 255, 0.08);
            }

            .switch input {
                width: 18px;
                height: 18px;
                accent-color: var(--accent);
            }

            .stats {
                display: grid;
                grid-template-columns: repeat(3, minmax(0, 1fr));
                gap: 12px;
            }

            .stat {
                padding: 16px;
                border-radius: 20px;
                background: var(--panel-soft);
                border: 1px solid rgba(255, 255, 255, 0.06);
            }

            .stat strong {
                display: block;
                margin-top: 8px;
                font-size: 1.05rem;
            }

            .empty {
                display: grid;
                place-items: center;
                flex: 1;
                border-radius: 28px;
                border: 1px dashed rgba(255, 255, 255, 0.1);
                color: var(--muted);
            }

            @media (max-width: 1100px) {
                .layout {
                    grid-template-columns: 1fr;
                }

                .hero-feed {
                    min-height: 420px;
                }
            }

            @media (max-width: 720px) {
                .app {
                    width: calc(100% - 12px);
                    margin: 6px auto;
                    padding: 8px;
                    border-radius: 24px;
                }

                .sidebar,
                .main {
                    border-radius: 22px;
                    padding: 14px;
                }

                .main-head {
                    flex-direction: column;
                }

                .stats {
                    grid-template-columns: 1fr;
                }
            }
        </style>
    </head>
    <body>
        <div class="app">
            <div class="layout">
                <aside class="sidebar">
                    <div class="brand">
                        <div class="brand-mark">SC</div>
                        <div>
                            <h1>Sentinel</h1>
                            <p class="muted">Camera board</p>
                        </div>
                    </div>

                    <div class="camera-stack" id="cameraGrid"></div>

                    <div class="nav-dots">
                        <span class="active"></span>
                        <span></span>
                        <span></span>
                    </div>

                    <button class="ghost-button utility-button" id="refreshAll" title="Neu laden">!</button>
                </aside>

                <main class="main">
                    <div class="main-head">
                        <div>
                            <h2 id="detailTitle">Kamera auswaehlen</h2>
                            <p class="muted" id="detailSubtitle">Klicke links auf eine kleine Kameravorschau.</p>
                        </div>

                        <div class="main-toolbar">
                            <span class="info-pill"><span class="state-dot"></span><span id="systemStatus">System online</span></span>
                            <label class="switch">
                                <input type="checkbox" id="globalOverlayToggle" checked />
                                <span>Overlay in Grossansicht</span>
                            </label>
                        </div>
                    </div>

                    <section id="detailPanel" class="empty">
                        <div>
                            <h3>Keine Kamera aktiv</h3>
                            <p>Die kleinen Vorschaufenster links bleiben live.</p>
                        </div>
                    </section>
                </main>
            </div>
        </div>

        <script>
            const state = {
                cameras: [],
                selectedCameraId: null,
                overlayEnabled: true,
                status: {
                    motion: "Lade...",
                    label: "Lade...",
                    classification_interval: 5,
                    cameras: [],
                },
            };

            const cameraGrid = document.getElementById("cameraGrid");
            const detailPanel = document.getElementById("detailPanel");
            const detailTitle = document.getElementById("detailTitle");
            const detailSubtitle = document.getElementById("detailSubtitle");
            const systemStatus = document.getElementById("systemStatus");
            const globalOverlayToggle = document.getElementById("globalOverlayToggle");
            const refreshAll = document.getElementById("refreshAll");

            function feedUrl(cameraId, overlay, bustCache = false) {
                const suffix = bustCache ? `&ts=${Date.now()}` : "";
                return `/camera_feed/${cameraId}?overlay=${overlay ? "1" : "0"}${suffix}`;
            }

            function getCameraStatus(cameraId) {
                return state.status.cameras.find((camera) => camera.id === cameraId) || {
                    motion: "Keine Daten",
                    label: "Keine Daten",
                    state: "offline",
                };
            }

            function selectCamera(cameraId) {
                state.selectedCameraId = cameraId;
                renderTiles();
                renderDetail();
            }

            async function saveCameraName(cameraId) {
                const input = document.getElementById(`rename-${cameraId}`);
                const name = input.value.trim();
                if (!name) {
                    return;
                }

                const response = await fetch(`/api/cameras/${cameraId}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ name }),
                });

                if (!response.ok) {
                    systemStatus.textContent = "Speichern fehlgeschlagen";
                    return;
                }

                const data = await response.json();
                state.cameras = state.cameras.map((camera) =>
                    camera.id === cameraId ? data.camera : camera
                );
                renderTiles();
                renderDetail();
                systemStatus.textContent = `${data.camera.name} gespeichert`;
            }

            function renderTiles() {
                cameraGrid.innerHTML = "";

                state.cameras.forEach((camera) => {
                    const status = getCameraStatus(camera.id);
                    const tile = document.createElement("article");
                    tile.className = "camera-tile";

                    if (camera.id === state.selectedCameraId) {
                        tile.classList.add("active");
                    }

                    tile.innerHTML = `
                        <div class="tile-head">
                            <div>
                                <h3>${camera.name}</h3>
                                <p class="muted">${camera.location}</p>
                            </div>
                            <span class="state-pill">${camera.state}</span>
                        </div>

                        <div class="tile-preview" data-open-camera="${camera.id}">
                            <img src="${feedUrl(camera.id, false)}" alt="${camera.name}" />
                            <div class="tile-overlay">
                                <span id="motion-badge-${camera.id}" class="chip ${status.motion === "Bewegung erkannt" ? "alert" : ""}">${status.motion}</span>
                                <span id="label-badge-${camera.id}" class="chip">${status.label}</span>
                            </div>
                        </div>

                        <p class="muted">${camera.description}</p>

                        <div class="rename-box">
                            <input id="rename-${camera.id}" type="text" value="${camera.name}" maxlength="40" />
                            <button class="accent-button" data-save-camera="${camera.id}">OK</button>
                        </div>
                    `;

                    cameraGrid.appendChild(tile);
                });

                document.querySelectorAll("[data-open-camera]").forEach((element) => {
                    element.addEventListener("click", () => {
                        selectCamera(element.dataset.openCamera);
                    });
                });

                document.querySelectorAll("[data-save-camera]").forEach((element) => {
                    element.addEventListener("click", () => {
                        saveCameraName(element.dataset.saveCamera);
                    });
                });
            }

            function renderDetail() {
                const camera = state.cameras.find((entry) => entry.id === state.selectedCameraId);

                if (!camera) {
                    detailTitle.textContent = "Kamera auswaehlen";
                    detailSubtitle.textContent = "Klicke links auf eine kleine Kameravorschau.";
                    detailPanel.className = "empty";
                    detailPanel.innerHTML = `
                        <div>
                            <h3>Keine Kamera aktiv</h3>
                            <p>Die kleinen Vorschaufenster links bleiben live.</p>
                        </div>
                    `;
                    return;
                }

                const status = getCameraStatus(camera.id);
                detailTitle.textContent = camera.name;
                detailSubtitle.textContent = `${camera.location} · ${camera.description}`;
                detailPanel.className = "";
                detailPanel.innerHTML = `
                    <div class="hero-feed">
                        <img id="detailFeed" src="${feedUrl(camera.id, state.overlayEnabled)}" alt="${camera.name}" />
                        <div class="hero-overlay">
                            <span id="detailMotionBadge" class="chip ${status.motion === "Bewegung erkannt" ? "alert" : ""}">${status.motion}</span>
                            <span class="chip">${state.overlayEnabled ? "Overlay an" : "Overlay aus"}</span>
                        </div>
                    </div>

                    <div class="stats">
                        <div class="stat">
                            <p class="muted">Erkanntes Objekt</p>
                            <strong id="detailLabelValue">${status.label}</strong>
                        </div>
                        <div class="stat">
                            <p class="muted">Bewegungsstatus</p>
                            <strong id="detailMotionValue">${status.motion}</strong>
                        </div>
                        <div class="stat">
                            <p class="muted">Analyseintervall</p>
                            <strong>${state.status.classification_interval} Sekunden</strong>
                        </div>
                    </div>
                `;
            }

            function syncStatusUi() {
                state.cameras.forEach((camera) => {
                    const status = getCameraStatus(camera.id);
                    const motion = document.getElementById(`motion-badge-${camera.id}`);
                    const label = document.getElementById(`label-badge-${camera.id}`);

                    if (motion) {
                        motion.textContent = status.motion;
                        motion.classList.toggle("alert", status.motion === "Bewegung erkannt");
                    }

                    if (label) {
                        label.textContent = status.label;
                    }
                });

                const detailMotionBadge = document.getElementById("detailMotionBadge");
                const detailMotionValue = document.getElementById("detailMotionValue");
                const detailLabelValue = document.getElementById("detailLabelValue");

                if (state.selectedCameraId) {
                    const status = getCameraStatus(state.selectedCameraId);

                    if (detailMotionBadge) {
                        detailMotionBadge.textContent = status.motion;
                        detailMotionBadge.classList.toggle("alert", status.motion === "Bewegung erkannt");
                    }

                    if (detailMotionValue) {
                        detailMotionValue.textContent = status.motion;
                    }

                    if (detailLabelValue) {
                        detailLabelValue.textContent = status.label;
                    }
                }
            }

            async function loadCameras() {
                const response = await fetch("/api/cameras");
                const data = await response.json();
                state.cameras = data.cameras || [];

                if (!state.selectedCameraId && state.cameras.length > 0) {
                    state.selectedCameraId = state.cameras[0].id;
                }
            }

            async function updateStatus() {
                try {
                    const response = await fetch("/api/status");
                    state.status = await response.json();
                    systemStatus.textContent = `${state.status.motion} · ${state.status.label}`;
                    syncStatusUi();
                } catch (error) {
                    systemStatus.textContent = "Status nicht erreichbar";
                }
            }

            globalOverlayToggle.addEventListener("change", (event) => {
                state.overlayEnabled = event.target.checked;
                renderDetail();
            });

            refreshAll.addEventListener("click", () => {
                document.querySelectorAll(".tile-preview img").forEach((img) => {
                    const cameraId = img.closest("[data-open-camera]").dataset.openCamera;
                    img.src = feedUrl(cameraId, false, true);
                });

                const detailFeed = document.getElementById("detailFeed");
                if (detailFeed && state.selectedCameraId) {
                    detailFeed.src = feedUrl(state.selectedCameraId, state.overlayEnabled, true);
                }
            });

            async function init() {
                await loadCameras();
                renderTiles();
                renderDetail();
                await updateStatus();
                setInterval(updateStatus, 3000);
            }

            init();
        </script>
    </body>
</html>
