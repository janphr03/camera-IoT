<!DOCTYPE html>
<html lang="de">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Sentinel Stream</title>
        <style>
            :root {
                --bg: #06111f;
                --blue: #52a8ff;
                --blue-soft: rgba(82, 168, 255, 0.16);
                --cyan: #7ce7ff;
                --panel: rgba(7, 18, 34, 0.64);
                --line: rgba(158, 205, 255, 0.16);
                --text: #f3f8ff;
                --muted: #9bb4cf;
                --shadow: 0 30px 90px rgba(0, 0, 0, 0.52);
            }

            * {
                box-sizing: border-box;
            }

            html,
            body {
                width: 100%;
                height: 100%;
            }

            body {
                margin: 0;
                overflow: hidden;
                font-family: "Segoe UI", "Helvetica Neue", sans-serif;
                color: var(--text);
                background:
                    radial-gradient(circle at 18% 12%, rgba(82, 168, 255, 0.22), transparent 26%),
                    radial-gradient(circle at 86% 16%, rgba(124, 231, 255, 0.12), transparent 24%),
                    linear-gradient(180deg, #0a1a2e 0%, var(--bg) 100%);
            }

            .stage {
                position: fixed;
                inset: 0;
                padding: 14px;
                display: grid;
            }

            .viewer {
                position: relative;
                overflow: hidden;
                border-radius: 34px;
                border: 1px solid rgba(124, 231, 255, 0.2);
                background: #020914;
                box-shadow: var(--shadow);
            }

            .viewer::before {
                content: "";
                position: absolute;
                inset: 0;
                z-index: 2;
                pointer-events: none;
                background:
                    linear-gradient(180deg, rgba(2, 9, 20, 0.78) 0%, rgba(2, 9, 20, 0.08) 20%, rgba(2, 9, 20, 0.04) 70%, rgba(2, 9, 20, 0.72) 100%),
                    radial-gradient(circle at center, transparent 58%, rgba(0, 0, 0, 0.35) 100%);
            }

            #cameraFeed {
                width: 100%;
                height: 100%;
                display: block;
                object-fit: cover;
                background: #020914;
            }

            .topbar,
            .bottombar {
                position: absolute;
                left: 22px;
                right: 22px;
                z-index: 3;
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 14px;
            }

            .topbar {
                top: 20px;
            }

            .bottombar {
                bottom: 20px;
            }

            .glass {
                border: 1px solid var(--line);
                background: var(--panel);
                backdrop-filter: blur(18px);
                box-shadow: 0 16px 44px rgba(0, 0, 0, 0.22);
            }

            .brand {
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 12px 14px;
                border-radius: 22px;
            }

            .brand-mark {
                width: 42px;
                height: 42px;
                border-radius: 15px;
                display: grid;
                place-items: center;
                color: #04101d;
                font-weight: 900;
                background: linear-gradient(135deg, var(--cyan), var(--blue));
            }

            h1,
            p {
                margin: 0;
            }

            h1 {
                font-size: 1rem;
                letter-spacing: 0.04em;
            }

            .muted {
                color: var(--muted);
                font-size: 0.84rem;
            }

            .controls {
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 10px;
                border-radius: 22px;
            }

            .switch {
                display: inline-flex;
                align-items: center;
                gap: 10px;
                padding: 10px 12px;
                border-radius: 999px;
                background: rgba(255, 255, 255, 0.05);
                cursor: pointer;
                user-select: none;
            }

            .switch input {
                width: 18px;
                height: 18px;
                accent-color: var(--blue);
            }

            button {
                border: 0;
                border-radius: 999px;
                padding: 12px 14px;
                color: #04101d;
                background: linear-gradient(135deg, var(--cyan), var(--blue));
                font-weight: 800;
                cursor: pointer;
            }

            .status {
                display: inline-flex;
                align-items: center;
                gap: 10px;
                padding: 12px 14px;
                border-radius: 999px;
                max-width: min(680px, 100%);
            }

            .dot {
                width: 9px;
                height: 9px;
                border-radius: 50%;
                background: var(--cyan);
                box-shadow: 0 0 18px rgba(124, 231, 255, 0.95);
            }

            .reticle {
                position: absolute;
                z-index: 3;
                inset: 86px 32px;
                pointer-events: none;
                border: 1px solid rgba(124, 231, 255, 0.08);
                border-radius: 24px;
            }

            .reticle::before,
            .reticle::after {
                content: "";
                position: absolute;
                width: 64px;
                height: 64px;
                border-color: rgba(124, 231, 255, 0.52);
            }

            .reticle::before {
                top: -1px;
                left: -1px;
                border-top: 2px solid;
                border-left: 2px solid;
            }

            .reticle::after {
                right: -1px;
                bottom: -1px;
                border-right: 2px solid;
                border-bottom: 2px solid;
            }

            @media (max-width: 720px) {
                .stage {
                    padding: 8px;
                }

                .viewer {
                    border-radius: 24px;
                }

                .topbar,
                .bottombar {
                    left: 12px;
                    right: 12px;
                    flex-direction: column;
                    align-items: stretch;
                }

                .topbar {
                    top: 12px;
                }

                .bottombar {
                    bottom: 12px;
                }

                .brand,
                .controls,
                .status {
                    width: 100%;
                    justify-content: space-between;
                }

                .reticle {
                    display: none;
                }
            }
        </style>
    </head>
    <body>
        <main class="stage">
            <section class="viewer">
                <img id="cameraFeed" src="/camera_feed/pi-main?overlay=0&color=raw" alt="Kamera Livebild" />

                <div class="topbar">
                    <div class="brand glass">
                        <div class="brand-mark">SC</div>
                        <div>
                            <h1>Sentinel Stream</h1>
                            <p class="muted">Ein Stream, keine Polling-Requests</p>
                        </div>
                    </div>

                    <div class="controls glass">
                        <label class="switch">
                            <input id="overlayToggle" type="checkbox" />
                            <span>Bewegungsrahmen</span>
                        </label>
                        <button id="colorButton" type="button">Farbe wechseln</button>
                        <button id="reloadButton" type="button">Neu verbinden</button>
                    </div>
                </div>

                <div class="reticle"></div>

                <div class="bottombar">
                    <div class="status glass">
                        <span class="dot"></span>
                        <span id="streamStatus">Direkter MJPEG-Stream vom Raspberry Pi.</span>
                    </div>
                </div>
            </section>
        </main>

        <script>
            const cameraFeed = document.getElementById("cameraFeed");
            const overlayToggle = document.getElementById("overlayToggle");
            const colorButton = document.getElementById("colorButton");
            const reloadButton = document.getElementById("reloadButton");
            const streamStatus = document.getElementById("streamStatus");
            const colorModes = ["raw", "rgb_to_bgr", "swap_rb"];
            let colorModeIndex = 0;

            function reconnectStream() {
                const overlay = overlayToggle.checked ? "1" : "0";
                const color = colorModes[colorModeIndex];
                cameraFeed.src = `/camera_feed/pi-main?overlay=${overlay}&color=${color}&ts=${Date.now()}`;
                const streamText = overlayToggle.checked
                    ? "Ein Stream mit leichtem Bewegungsrahmen."
                    : "Cleaner Direktstream ohne Analyse-Overlay.";
                streamStatus.textContent = `${streamText} Farbmodus: ${color}`;
            }

            function cycleColorMode() {
                colorModeIndex = (colorModeIndex + 1) % colorModes.length;
                reconnectStream();
            }

            overlayToggle.addEventListener("change", reconnectStream);
            colorButton.addEventListener("click", cycleColorMode);
            reloadButton.addEventListener("click", reconnectStream);
        </script>
    </body>
</html>
