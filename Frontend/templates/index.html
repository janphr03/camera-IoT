<!DOCTYPE html>
<html lang="de">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Sentinel Cam</title>
        <style>
            :root {
                --bg: #070907;
                --panel: rgba(12, 15, 13, 0.78);
                --line: rgba(255, 255, 255, 0.1);
                --text: #f4f6f0;
                --muted: #a4ad9f;
                --accent: #d2f58d;
                --accent-soft: rgba(210, 245, 141, 0.16);
                --danger: #ff7d66;
                --shadow: 0 24px 80px rgba(0, 0, 0, 0.5);
            }

            * {
                box-sizing: border-box;
            }

            html,
            body {
                width: 100%;
                height: 100%;
            }

            body {
                margin: 0;
                overflow: hidden;
                font-family: "Segoe UI", "Helvetica Neue", sans-serif;
                color: var(--text);
                background:
                    radial-gradient(circle at 20% 10%, rgba(210, 245, 141, 0.12), transparent 24%),
                    radial-gradient(circle at 85% 20%, rgba(90, 130, 80, 0.16), transparent 28%),
                    linear-gradient(180deg, #10140f 0%, var(--bg) 100%);
            }

            .camera-stage {
                position: fixed;
                inset: 0;
                display: grid;
                place-items: center;
                padding: 14px;
            }

            .camera-frame {
                position: relative;
                width: 100%;
                height: 100%;
                overflow: hidden;
                border-radius: 30px;
                border: 1px solid rgba(210, 245, 141, 0.18);
                background: #050605;
                box-shadow: var(--shadow);
            }

            .camera-frame::before {
                content: "";
                position: absolute;
                inset: 0;
                z-index: 2;
                pointer-events: none;
                background:
                    linear-gradient(180deg, rgba(0, 0, 0, 0.62) 0%, rgba(0, 0, 0, 0.04) 22%, rgba(0, 0, 0, 0.08) 72%, rgba(0, 0, 0, 0.68) 100%),
                    radial-gradient(circle at 50% 50%, transparent 55%, rgba(0, 0, 0, 0.32) 100%);
            }

            .camera-frame::after {
                content: "";
                position: absolute;
                inset: 0;
                z-index: 3;
                pointer-events: none;
                opacity: 0.12;
                background-image: linear-gradient(rgba(255, 255, 255, 0.35) 1px, transparent 1px);
                background-size: 100% 4px;
                mix-blend-mode: overlay;
            }

            #cameraFeed {
                width: 100%;
                height: 100%;
                object-fit: cover;
                display: block;
                background: #050605;
            }

            .topbar,
            .bottombar {
                position: absolute;
                left: 22px;
                right: 22px;
                z-index: 4;
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 14px;
            }

            .topbar {
                top: 20px;
            }

            .bottombar {
                bottom: 20px;
            }

            .glass {
                border: 1px solid var(--line);
                background: var(--panel);
                backdrop-filter: blur(18px);
                box-shadow: 0 14px 40px rgba(0, 0, 0, 0.22);
            }

            .brand {
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 12px 14px;
                border-radius: 20px;
            }

            .brand-mark {
                width: 38px;
                height: 38px;
                border-radius: 13px;
                display: grid;
                place-items: center;
                color: #202d13;
                font-weight: 900;
                background: linear-gradient(135deg, var(--accent), #efffca);
            }

            h1,
            p {
                margin: 0;
            }

            h1 {
                font-size: 0.98rem;
                letter-spacing: 0.03em;
            }

            .muted {
                color: var(--muted);
                font-size: 0.84rem;
            }

            .controls {
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 10px;
                border-radius: 20px;
            }

            .switch {
                display: inline-flex;
                align-items: center;
                gap: 10px;
                padding: 10px 12px;
                border-radius: 999px;
                background: rgba(255, 255, 255, 0.05);
                cursor: pointer;
                user-select: none;
            }

            .switch input {
                width: 18px;
                height: 18px;
                accent-color: var(--accent);
            }

            button {
                border: 0;
                border-radius: 999px;
                padding: 12px 14px;
                color: #203013;
                background: linear-gradient(135deg, var(--accent), #efffca);
                font-weight: 800;
                cursor: pointer;
            }

            .status-strip {
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 12px 14px;
                border-radius: 999px;
                max-width: min(620px, 100%);
            }

            .dot {
                width: 9px;
                height: 9px;
                border-radius: 50%;
                background: var(--accent);
                box-shadow: 0 0 16px rgba(210, 245, 141, 0.85);
            }

            .corner {
                position: absolute;
                z-index: 4;
                width: 46px;
                height: 46px;
                border-color: rgba(210, 245, 141, 0.7);
                pointer-events: none;
            }

            .corner.top-left {
                top: 92px;
                left: 32px;
                border-top: 2px solid;
                border-left: 2px solid;
                border-color: rgba(210, 245, 141, 0.62);
            }

            .corner.top-right {
                top: 92px;
                right: 32px;
                border-top: 2px solid;
                border-right: 2px solid;
                border-color: rgba(210, 245, 141, 0.62);
            }

            .corner.bottom-left {
                bottom: 92px;
                left: 32px;
                border-bottom: 2px solid;
                border-left: 2px solid;
                border-color: rgba(210, 245, 141, 0.62);
            }

            .corner.bottom-right {
                right: 32px;
                bottom: 92px;
                border-right: 2px solid;
                border-bottom: 2px solid;
                border-color: rgba(210, 245, 141, 0.62);
            }

            @media (max-width: 720px) {
                .camera-stage {
                    padding: 8px;
                }

                .camera-frame {
                    border-radius: 22px;
                }

                .topbar,
                .bottombar {
                    left: 12px;
                    right: 12px;
                    flex-direction: column;
                    align-items: stretch;
                }

                .topbar {
                    top: 12px;
                }

                .bottombar {
                    bottom: 12px;
                }

                .controls,
                .brand,
                .status-strip {
                    width: 100%;
                    justify-content: space-between;
                }

                .corner {
                    display: none;
                }
            }
        </style>
    </head>
    <body>
        <main class="camera-stage">
            <section class="camera-frame">
                <img id="cameraFeed" src="/camera_feed/pi-main?overlay=0" alt="Kamera Livebild" />

                <div class="topbar">
                    <div class="brand glass">
                        <div class="brand-mark">SC</div>
                        <div>
                            <h1>Sentinel Live</h1>
                            <p class="muted">Vollbild Kameraansicht</p>
                        </div>
                    </div>

                    <div class="controls glass">
                        <label class="switch">
                            <input id="overlayToggle" type="checkbox" />
                            <span>Overlay</span>
                        </label>
                        <button id="reloadButton" type="button">Neu laden</button>
                    </div>
                </div>

                <div class="corner top-left"></div>
                <div class="corner top-right"></div>
                <div class="corner bottom-left"></div>
                <div class="corner bottom-right"></div>

                <div class="bottombar">
                    <div class="status-strip glass">
                        <span class="dot"></span>
                        <span id="streamStatus">Ein einzelner Live-Stream aktiv. Keine Snapshot-Requests.</span>
                    </div>
                </div>
            </section>
        </main>

        <script>
            const cameraFeed = document.getElementById("cameraFeed");
            const overlayToggle = document.getElementById("overlayToggle");
            const reloadButton = document.getElementById("reloadButton");
            const streamStatus = document.getElementById("streamStatus");

            function setStream() {
                const overlay = overlayToggle.checked ? "1" : "0";
                cameraFeed.src = `/camera_feed/pi-main?overlay=${overlay}&ts=${Date.now()}`;
                streamStatus.textContent = overlayToggle.checked
                    ? "Live-Stream mit einfachem Bewegungsrahmen."
                    : "Cleaner Live-Stream ohne Overlay.";
            }

            overlayToggle.addEventListener("change", setStream);
            reloadButton.addEventListener("click", setStream);
        </script>
    </body>
</html>
